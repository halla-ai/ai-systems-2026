<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Edge gradients follow the direction of each edge -->
    <linearGradient id="e1" x1="16" y1="5" x2="4" y2="27" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="e2" x1="4" y1="27" x2="28" y2="27" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="e3" x1="28" y1="27" x2="16" y2="5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <!-- Soft glow filter for nodes -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Connecting edges — gradient flows clockwise -->
  <line x1="16" y1="5"  x2="4"  y2="27" stroke="url(#e1)" stroke-width="1.75" stroke-linecap="round"/>
  <line x1="4"  y1="27" x2="28" y2="27" stroke="url(#e2)" stroke-width="1.75" stroke-linecap="round"/>
  <line x1="28" y1="27" x2="16" y2="5"  stroke="url(#e3)" stroke-width="1.75" stroke-linecap="round"/>

  <!-- Agent nodes with glow -->
  <!-- Top  : Planner (blue) -->
  <circle cx="16" cy="5"  r="3.5" fill="#2563EB" filter="url(#glow)"/>
  <!-- BL   : Coder   (cyan) -->
  <circle cx="4"  cy="27" r="3.5" fill="#22D3EE" filter="url(#glow)"/>
  <!-- BR   : QA      (orange) -->
  <circle cx="28" cy="27" r="3.5" fill="#F97316" filter="url(#glow)"/>
</svg>
